name: Update Quiz Index

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-index:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate index.json
        run: node scripts/build-index.js

      - name: Commit updated index.json
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add index.json
          git diff --cached --quiet || git commit -m "Auto update index.json"
          git push
